<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home - SSGi Intern</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }
        .btn {
            display: block;
            width: 250px;
            margin: 20px auto;
            padding: 15px;
            font-size: 18px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
        }
        .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Welcome to SSGi Intern Portal</h1>
    <a href="{% url 'interns' %}" class="btn">Continue as Student</a>
    <a href="{% url 'departments' %}" class="btn">Continue as Department</a>
    <a href="/admin/login/" class="btn">Continue as Admin</a>
</body>
</html>
