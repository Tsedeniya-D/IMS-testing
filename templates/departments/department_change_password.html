{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password | SSGI</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* === Internal CSS: Matching your original style exactly === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #083f76;
            --secondary-color: #e68a00;
            --accent-color: #1a5fb4;
            --light-color: #f8f9fa;
            --text-color: #444;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f8f9fa url('{% static "images/bg-space.jpg" %}') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-color);
            line-height: 1.8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            z-index: -1;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            text-align: center;
            padding: 20px 0;
            background: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .logo {
            width: 180px;
            position: absolute;
            top: 50%;
            left: 20px;
            transform: translateY(-50%);
        }

        .container {
            max-width: 550px;
            margin: 0 auto;
            padding: 120px 20px 60px;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            border: 1px solid rgba(230, 138, 0, 0.2);
        }

        .form-header {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: white;
            padding: 30px;
            text-align: center;
            border-bottom: 6px solid var(--secondary-color);
        }

        .form-content {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--primary-color);
        }

        /* Input Styling with Space for Eye Icon */
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 14px 45px 14px 20px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            transition: var(--transition);
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(8, 63, 118, 0.1);
        }

        /* See/Unsee Toggle Icon */
        .toggle-password {
            position: absolute;
            right: 15px;
            color: #888;
            cursor: pointer;
            z-index: 10;
            transition: var(--transition);
        }

        .toggle-password:hover {
            color: var(--secondary-color);
        }

        /* Password Strength Meter */
        .meter-container {
            height: 6px;
            background: #eee;
            margin: 10px 0;
            border-radius: 10px;
            overflow: hidden;
        }

        #meter-fill {
            height: 100%;
            width: 0%;
            background-color: #e74c3c;
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        /* Suggestion Rules Styles */
        .rule-list {
            font-size: 0.8rem;
            margin-top: 10px;
        }

        .rule {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
            color: #888;
            transition: var(--transition);
        }

        .rule.valid {
            color: #2ecc71;
            font-weight: 500;
        }

        .rule.invalid {
            color: #e74c3c;
        }

        .submit-btn {
            padding: 10px 22px;
            font-size: 14px;
            width: auto;
            display: inline-block;
            border-radius: 30px;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: white;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 15px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .success-msg {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #c3e6cb;
        }
    </style>
</head>

<body>

    <header>
        <img src="{% static 'images/logo.jpg' %}" alt="Logo" class="logo" />
    </header>

    <main class="container">
        <div class="form-container">
            <div class="form-header">
                <h2><i class="fas fa-shield-alt"></i> Change Password</h2>
                <p>Update your department security settings</p>
            </div>

            <div class="form-content">
                {% if messages %}
                {% for message in messages %}
                <div class="success-msg">{{ message }}</div>
                {% endfor %}
                {% endif %}

                <form method="POST" id="passwordForm">
                    {% csrf_token %}

                    <div class="form-group">
                        <label>Current Password</label>
                        <div class="input-wrapper">
                            <input type="password" name="old_password" id="old_password" required>
                            <i class="fas fa-eye toggle-password" onclick="toggleVisibility('old_password', this)"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>New Password</label>
                        <div class="input-wrapper">
                            <input type="password" name="new_password1" id="new_password" required
                                oninput="checkStrength(this.value)">
                            <i class="fas fa-eye toggle-password" onclick="toggleVisibility('new_password', this)"></i>
                        </div>

                        <div class="meter-container">
                            <div id="meter-fill"></div>
                        </div>

                        <div class="rule-list">
                            <div id="len-rule" class="rule invalid"><i class="fas fa-times-circle"></i> Min. 8
                                characters</div>
                            <div id="common-rule" class="rule invalid"><i class="fas fa-times-circle"></i> Not a common
                                password (123, abc...)</div>
                            <div id="complex-rule" class="rule invalid"><i class="fas fa-times-circle"></i> Include a
                                number or symbol</div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Confirm New Password</label>
                        <div class="input-wrapper">
                            <input type="password" name="new_password2" id="confirm_password" required>
                            <i class="fas fa-eye toggle-password"
                                onclick="toggleVisibility('confirm_password', this)"></i>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn">
                        Update Password
                    </button>
                </form>

            </div>
        </div>
    </main>

    <script>
        // 1. Function to See or Unsee password
        function toggleVisibility(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
        }

        // 2. Real-time Strength & Common Password Check
        function checkStrength(val) {
            const meter = document.getElementById('meter-fill');
            const ruleLen = document.getElementById('len-rule');
            const ruleCommon = document.getElementById('common-rule');
            const ruleComplex = document.getElementById('complex-rule');

            let score = 0;

            // Length Check
            if (val.length >= 8) {
                updateRule(ruleLen, true);
                score += 33;
            } else {
                updateRule(ruleLen, false);
            }

            // Common Password Check (to avoid Django post-submit error)
            const commonOnes = ['123', 'password', 'admin', 'qwerty', 'ethiopia'];
            let isCommon = false;
            commonOnes.forEach(str => {
                if (val.toLowerCase().includes(str)) isCommon = true;
            });

            if (val.length > 0 && !isCommon) {
                updateRule(ruleCommon, true);
                score += 33;
            } else {
                updateRule(ruleCommon, false);
            }

            // Complexity (Numbers or Symbols)
            if (/[0-9]/.test(val) || /[^A-Za-z0-9]/.test(val)) {
                updateRule(ruleComplex, true);
                score += 34;
            } else {
                updateRule(ruleComplex, false);
            }

            // Update UI
            meter.style.width = score + "%";
            if (score < 40) meter.style.backgroundColor = "#e74c3c"; // Red
            else if (score < 100) meter.style.backgroundColor = "#f1c40f"; // Yellow
            else meter.style.backgroundColor = "#2ecc71"; // Green
        }

        function updateRule(element, isValid) {
            const icon = element.querySelector('i');
            if (isValid) {
                element.classList.remove('invalid');
                element.classList.add('valid');
                icon.className = 'fas fa-check-circle';
            } else {
                element.classList.remove('valid');
                element.classList.add('invalid');
                icon.className = 'fas fa-times-circle';
            }
        }
    </script>
</body>

</html>
